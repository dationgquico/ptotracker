<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimo PH // Leave & Availability Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f111a; --bg-card: #161925; --accent-primary: #6366f1; --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.06); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .dashboard-grid { display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        h2 { font-family: 'Space Grotesk'; font-size: 1.25rem; margin-bottom: 25px; }
        .status-row { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .avatar { width: 45px; height: 45px; border-radius: 12px; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-left: auto; }
        .credit-row { display: flex; justify-content: space-between; padding: 14px; background: rgba(255, 255, 255, 0.02); border-radius: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Optimo PH // Leave & Availability Tracker</h1>
    <div class="dashboard-grid">
        <div class="sidebar">
            <div class="card">
                <h2>Daily Status Map</h2>
                <input type="date" id="datePicker" onchange="updateUI()" style="width:100%; padding:10px; background:#000; border:1px solid var(--border); border-radius:10px; color:white; margin-bottom:20px;">
                <div id="statusMapContainer"></div>
            </div>
            <div class="card">
                <h2>Remaining Balances</h2>
                <div id="creditsContainer"></div>
            </div>
        </div>
        <div class="main-col">
            <div class="card">
                <h2>Out of Office Timeline</h2>
                <div id="scheduleContainer"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzi87JjFK-f3frwS4684DiSu3ZOGBawXhPX8PsLljNrDAFoqYe6t7_VT7gjuxEPZFwd/exec';
    let teamData = [], ptoLogs = [];

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'getData' }) 
            });
            const result = await response.json();
            teamData = result.team;
            ptoLogs = result.logs;
            updateUI();
        } catch (e) {
            console.error("Fetch failed:", e);
        }
    }

    function updateUI() {
        const date = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
        const members = ["Alex", "Darla", "AJ", "Jess", "Chen"];
        
        // Render Status Map
        document.getElementById('statusMapContainer').innerHTML = members.map(name => {
            const isAbsent = ptoLogs.some(log => log.name === name && log.date.includes(date));
            return `
            <div class="status-row">
                <img class="avatar" src="https://api.dicebear.com/9.x/notionists/svg?seed=${name}">
                <div style="flex-grow:1;">${name}</div>
                <span class="badge" style="background:${isAbsent ? '#ef444433' : '#10b98133'}; color:${isAbsent ? '#ef4444' : '#10b981'}">
                    ${isAbsent ? 'ABSENT' : 'PRESENT'}
                </span>
            </div>`;
        }).join('');

        // Render Credits
        document.getElementById('creditsContainer').innerHTML = teamData.slice(1).map(row => `
            <div class="credit-row"><span>${row[0]}</span><span style="font-weight:700; color:#10b981;">${row[1]} Rem</span></div>
        `).join('');
    }

    document.getElementById('datePicker').valueAsDate = new Date();
    fetchData();
</script>
</body>
</html>
