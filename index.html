<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimo PH // Agency Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
            /* Status Colors */
            --status-present: #22c55e;
            --status-leave: #ef4444;
            --status-holiday: #f59e0b;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        
        /* Teammate Row */
        .member { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid var(--border); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #3f3f46; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        /* Status Badge */
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        
        h1 { font-family: 'Space Grotesk'; font-size: 2rem; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Optimo PH // Live Operations</h1>
    
    <div class="grid">
        <!-- Status Map -->
        <div class="card">
            <h2 style="margin-top:0;">Daily Status Map</h2>
            <input type="date" id="datePicker" onchange="renderStatusMap()" style="background:#27272a; color:white; border:none; padding:10px; border-radius:8px; margin-bottom:20px;">
            <div id="statusMap"></div>
        </div>

        <!-- Request Form -->
        <div class="card">
            <h2>File Request</h2>
            <form id="ptoForm">
                <select id="memberSelect" style="width:100%; padding:10px; background:#27272a; color:white; border:none; border-radius:8px; margin-bottom:10px;">
                    <option value="Alex">Alex</option>
                    <option value="Darla">Darla</option>
                    <option value="AJ">AJ</option>
                </select>
                <input type="date" id="ptoDate" style="width:100%; padding:10px; background:#27272a; color:white; border:none; border-radius:8px; margin-bottom:10px;">
                <button type="submit" style="width:100%; padding:12px; background:#6366f1; border:none; border-radius:8px; color:white; cursor:pointer;">Submit</button>
            </form>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'YOUR_URL_HERE';
    let teamData = ["Alex", "Darla", "AJ", "Jess", "Chen"]; // Add names here
    let ptoLogs = [];

    // Helper: Logic for Holidays and Status
    function getStatus(name, date) {
        const d = new Date(date);
        // Holiday Block: Dec 23 to Jan 5
        const isHoliday = (d.getMonth() === 11 && d.getDate() >= 23) || (d.getMonth() === 0 && d.getDate() <= 5);
        if(isHoliday) return { text: 'Holiday', color: 'var(--status-holiday)' };
        
        // Check if in logs
        const onLeave = ptoLogs.find(log => log.name === name && log.date === d.toDateString());
        return onLeave ? { text: 'Absent', color: 'var(--status-leave)' } : { text: 'Present', color: 'var(--status-present)' };
    }

    function renderStatusMap() {
        const date = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
        const map = document.getElementById('statusMap');
        map.innerHTML = '';
        
        teamData.forEach(name => {
            const status = getStatus(name, date);
            const row = document.createElement('div');
            row.className = 'member';
            row.innerHTML = `
                <div class="avatar">👤</div>
                <div style="flex-grow:1; font-weight:600;">${name}</div>
                <span class="badge" style="background:${status.color}33; color:${status.color}">${status.text}</span>
            `;
            map.appendChild(row);
        });
    }

    // Initialize
    document.getElementById('datePicker').valueAsDate = new Date();
    renderStatusMap();
</script>
</body>
</html>
