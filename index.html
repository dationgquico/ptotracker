<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Optimo PH // Agency Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #09090b; --bg-card: #18181b; --text-main: #ffffff; --status-present: #22c55e; --status-leave: #ef4444; --status-holiday: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: 24px; padding: 30px; border: 1px solid #27272a; }
        .member { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #27272a; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #3f3f46; display: flex; align-items: center; justify-content: center; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Daily Status Map</h2>
        <input type="date" id="datePicker" onchange="renderStatusMap()" style="background:#27272a; color:white; border:none; padding:10px; border-radius:8px; margin-bottom:20px;">
        <div id="statusMap"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzi87JjFK-f3frwS4684DiSu3ZOGBawXhPX8PsLljNrDAFoqYe6t7_VT7gjuxEPZFwd/exec';
    let teamData = ["Alex", "Darla", "AJ", "Jess", "Chen"];
    let ptoLogs = [];

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'getData'}) });
            const data = await res.json();
            ptoLogs = data.logs || [];
            renderStatusMap();
        } catch(e) { console.error("Sync failed", e); }
    }

    function getStatus(name, dateStr) {
        const d = new Date(dateStr);
        // Holiday Block: Dec 23 to Jan 5
        const isHoliday = (d.getMonth() === 11 && d.getDate() >= 23) || (d.getMonth() === 0 && d.getDate() <= 5);
        if(isHoliday) return { text: 'Holiday', color: 'var(--status-holiday)' };
        
        const onLeave = ptoLogs.find(log => log.name === name && log.date === d.toDateString());
        return onLeave ? { text: 'Absent', color: 'var(--status-leave)' } : { text: 'Present', color: 'var(--status-present)' };
    }

    function renderStatusMap() {
        const date = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
        const map = document.getElementById('statusMap');
        map.innerHTML = '';
        teamData.forEach(name => {
            const status = getStatus(name, date);
            map.innerHTML += `
                <div class="member">
                    <div class="avatar">👤</div>
                    <div style="flex-grow:1; font-weight:600;">${name}</div>
                    <span class="badge" style="background:${status.color}33; color:${status.color}">${status.text}</span>
                </div>`;
        });
    }

    document.getElementById('datePicker').valueAsDate = new Date();
    fetchData();
</script>
</body>
</html>
