<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimo PH — Leave Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f111a; --bg-card: #161925; --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15); --text-main: #f8fafc;
            --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.06); --success: #10b981;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 900px) { .dashboard-grid { grid-template-columns: 380px 1fr; } }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.3); margin-bottom: 30px; }
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; margin: 0 0 25px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Member Map Styles */
        .member-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid var(--border); }
        .avatar { width: 45px; height: 45px; border-radius: 12px; background: #2d3748; }
        .status-badge { padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; background: #064e3b; color: #10b981; margin-left: auto; }
        
        /* Reuse existing styles for credits/timeline */
        .credit-row, .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; }
        .credit-num { font-weight: 700; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>Optimo PH // Leave Tracker</h1>
    
    <div class="dashboard-grid">
        <!-- LEFT COLUMN -->
        <div>
            <div class="card">
                <h2>Remaining Balances</h2>
                <div id="creditsContainer"></div>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div>
            <div class="card">
                <h2>DAILY STATUS MAP</h2>
                <input type="date" id="datePicker" onchange="renderStatusMap()" style="width:100%; padding:10px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:10px; color:white; margin-bottom:20px;">
                <div id="statusMap"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const teamMembers = ["Alex", "Darla", "AJ", "Jess", "Chen"];
    
    // Aesthetic pixel-art avatars as seen in image_c33440.png
    function getAvatar(name) {
        const gender = name === 'AJ' ? 'male' : 'female';
        return `https://api.dicebear.com/9.x/pixel-art/svg?seed=${name}&gender=${gender}`;
    }

    function renderStatusMap() {
        const container = document.getElementById('statusMap');
        container.innerHTML = teamMembers.map(name => `
            <div class="member-row">
                <img class="avatar" src="${getAvatar(name)}" alt="${name}">
                <span style="font-weight:600;">${name}</span>
                <span class="status-badge">PRESENT</span>
            </div>`).join('');
    }

    document.getElementById('datePicker').valueAsDate = new Date();
    renderStatusMap();
</script>
</body>
</html>
