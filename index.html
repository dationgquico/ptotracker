<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimo PH — Leave Tracker</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-card: #161925;
            --accent-primary: #6366f1; /* Indigo */
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 50px;
            text-align: left;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0.01em;
        }

        /* Layout Architecture */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 380px 1fr;
            }
        }

        /* Glassmorphic Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 25px 0;
            letter-spacing: -0.01em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Balances & Credit Rows */
        .credit-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .credit-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .credit-row:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .credit-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .credit-details {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .credit-num {
            font-weight: 700;
            color: var(--success);
            font-size: 1rem;
            margin-left: 8px;
        }

        /* Input Styling */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input {
            width: 100%;
            padding: 14px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        button {
            width: 100%;
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        button:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Monthly Custom Dropdown Selector */
        .month-select {
            width: auto;
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 10px;
            background-color: rgba(0,0,0,0.3);
        }

        /* Timeline Schedule List */
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent-primary);
        }

        .schedule-member {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .leave-date {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: rgba(255,255,255,0.04);
            padding: 6px 12px;
            border-radius: 8px;
        }

        /* Status States */
        .loading {
            text-align: center;
            font-weight: 500;
            color: var(--text-muted);
            padding: 80px 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Optimo PH // Leave Tracker</h1>
        <p>Dynamic availability sync for creative operations.</p>
    </header>

    <div id="loadingMessage" class="loading">CONNECTING TO OPERATIONAL CLOUD INSTANCE...</div>

    <div id="mainContent" class="dashboard-grid" style="display: none;">
        
        <!-- Left Column -->
        <div class="sidebar-col">
            <div class="card" style="margin-bottom: 30px;">
                <h2>Remaining Balances</h2>
                <div id="creditsContainer" class="credit-list"></div>
            </div>

            <div class="card">
                <h2>File Leave Request</h2>
                <form id="ptoForm">
                    <div class="form-group">
                        <label for="memberSelect">Teammate</label>
                        <select id="memberSelect" required>
                            <option value="Alex">Alex</option>
                            <option value="Darla">Darla</option>
                            <option value="AJ">AJ</option>
                            <option value="Jess">Jess</option>
                            <option value="Chen">Chen</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="ptoDate">Target Date</label>
                        <input type="date" id="ptoDate" required>
                    </div>
                    <div class="form-group">
                        <label for="ptoDays">Duration (Days)</label>
                        <input type="number" id="ptoDays" min="0.5" step="0.5" value="1" required>
                    </div>
                    <button type="submit" id="submitBtn">Submit Request</button>
                </form>
            </div>
        </div>

        <!-- Right Column -->
        <div class="main-col">
            <div class="card">
                <h2>
                    <span>Out of Office Timeline</span>
                    <select id="monthFilter" class="month-select" onchange="renderSchedule()">
                    </select>
                </h2>
                
                <div id="scheduleContainer" class="schedule-list"></div>
            </div>
        </div>

    </div>
</div>

<script>
    // Injected newly generated Web App URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzi87JjFK-f3frwS4684DiSu3ZOGBawXhPX8PsLljNrDAFoqYe6t7_VT7gjuxEPZFwd/exec';

    let teamData = {};
    let ptoLogs = [];

    function setupMonthFilter() {
        const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        const select = document.getElementById('monthFilter');
        const currentMonth = new Date().getMonth();
        
        months.forEach((month, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.text = `${month} ${new Date().getFullYear()}`;
            if(idx === currentMonth) opt.selected = true;
            select.appendChild(opt);
        });
    }

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getData' })
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                processSheetData(result.team, result.logs);
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('mainContent').style.display = 'grid';
                renderCredits();
                renderSchedule();
            } else {
                showErrorState();
            }
        } catch (error) {
            showErrorState();
            console.error(error);
        }
    }

    function showErrorState() {
        document.getElementById('loadingMessage').innerHTML = `<span style="color:#ef4444;">SYNC BLOCK: API Authorization Pending.<br><span style="font-size:0.9rem; font-family:sans-serif; color:var(--text-muted);">Please check Manage Deployments setting in Sheet to ensure "Who has access: Anyone" is active.</span></span>`;
    }

    function processSheetData(teamRows, logRows) {
        teamData = {};
        teamRows.forEach(row => {
            teamData[row[0]] = { total: parseFloat(row[1]) || 0, used: 0 };
        });

        ptoLogs = logRows.map(row => {
            const name = row[1];
            const days = parseFloat(row[3]) || 0;
            if (teamData[name]) { teamData[name].used += days; }
            return { name: name, date: new Date(row[2]), days: days };
        });
    }

    function renderCredits() {
        const container = document.getElementById('creditsContainer');
        container.innerHTML = '';
        
        for (const [name, stats] of Object.entries(teamData)) {
            const remaining = stats.total - stats.used;
            const div = document.createElement('div');
            div.className = 'credit-row';
            div.innerHTML = `
                <span class="credit-name">${name}</span>
                <span class="credit-details">Used: ${stats.used}d | <span class="credit-num">${remaining} remaining</span></span>
            `;
            container.appendChild(div);
        }
    }

    function renderSchedule() {
        const container = document.getElementById('scheduleContainer');
        container.innerHTML = '';
        
        const selectedMonth = parseInt(document.getElementById('monthFilter').value);
        const currentYear = new Date().getFullYear();

        const filtered = ptoLogs.filter(log => {
            return log.date.getMonth() === selectedMonth && log.date.getFullYear() === currentYear;
        });

        filtered.sort((a,b) => a.date - b.date);

        if(filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:40px; font-size:0.95rem;">Operational clear. No team leave scheduled.</div>`;
            return;
        }

        filtered.forEach(log => {
            const div = document.createElement('div');
            div.className = 'schedule-item';
            div.innerHTML = `
                <div class="schedule-member">${log.name}</div>
                <div class="leave-date">${log.date.toLocaleDateString('en-US', {month: 'short', day: 'numeric'})} • ${log.days}d</div>
            `;
            container.appendChild(div);
        });
    }

    document.getElementById('ptoForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'TRANSMITTING DATA...';

        const payload = {
            action: 'addLog',
            name: document.getElementById('memberSelect').value,
            date: document.getElementById('ptoDate').value,
            days: document.getElementById('ptoDays').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            await fetchData();
            document.getElementById('ptoDate').value = '';
        } catch (error) {
            alert('Cloud communication disrupted.');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Submit Request';
        }
    });

    setupMonthFilter();
    fetchData();
</script>
</body>
</html>
