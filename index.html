<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Optimo PH // Agency Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f111a; --bg-card: #161925; --accent-blue: #3b82f6; --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255,255,255,0.06); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 40px 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .card { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        h2 { font-family: 'Space Grotesk'; font-size: 1.1rem; color: var(--accent-blue); margin: 0 0 20px 0; }
        .credit-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .member-row { display: flex; align-items: center; gap: 15px; padding: 10px 0; }
        .avatar { width: 45px; height: 45px; border-radius: 12px; background: #2d3748; }
        .timeline-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <!-- LEFT: Balances & Request Form -->
    <div>
        <div class="card">
            <h2>TEAM BALANCES</h2>
            <div id="creditsContainer"></div>
        </div>
        <div class="card">
            <h2>FILE REQUEST</h2>
            <form id="ptoForm">
                <select id="memberSelect" style="width:100%; padding:10px; background:var(--bg-dark); color:white; border:1px solid var(--border); border-radius:8px; margin-bottom:10px;">
                    <option>Alex</option><option>Darla</option><option>AJ</option><option>Jess</option><option>Chen</option>
                </select>
                <input type="date" id="ptoDate" style="width:100%; padding:10px; background:var(--bg-dark); color:white; border:1px solid var(--border); border-radius:8px; margin-bottom:10px;">
                <button type="submit" style="width:100%; padding:10px; background:var(--accent-blue); border:none; border-radius:8px; color:white; font-weight:700;">SUBMIT</button>
            </form>
        </div>
    </div>

    <!-- RIGHT: Timeline & Status Map -->
    <div>
        <div class="card">
            <h2>OUT OF OFFICE TIMELINE</h2>
            <div id="timelineContainer"></div>
        </div>
        <div class="card">
            <h2>DAILY STATUS MAP</h2>
            <input type="date" id="datePicker" onchange="fetchData()" style="width:100%; padding:8px; background:var(--bg-dark); color:white; border:1px solid var(--border); border-radius:8px; margin-bottom:15px;">
            <div id="statusMap"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzi87JjFK-f3frwS4684DiSu3ZOGBawXhPX8PsLljNrDAFoqYe6t7_VT7gjuxEPZFwd/exec';
    
    // Function to get specific avatar URL
    function getAvatar(name) {
        if (name === 'Darla') return `https://api.dicebear.com/9.x/adventurer/svg?seed=Darla&backgroundColor=ffdfbf`;
        if (name === 'AJ') return `https://api.dicebear.com/9.x/notionists/svg?seed=AJ&gender=male`;
        return `https://api.dicebear.com/9.x/notionists/svg?seed=${name}`;
    }

    async function fetchData() {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'getData'}) });
        const data = await res.json();
        
        // Render Timeline (Original style)
        document.getElementById('timelineContainer').innerHTML = data.logs.map(log => `
            <div class="timeline-item">
                <span>${log.name}</span>
                <span style="color:var(--text-muted);">${log.date}</span>
            </div>`).join('');

        // Render Daily Map
        const date = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
        document.getElementById('statusMap').innerHTML = ["Alex", "Darla", "AJ", "Jess", "Chen"].map(name => {
            const isAbsent = data.logs.some(l => l.name === name && l.date === new Date(date).toDateString());
            return `
                <div class="member-row" style="opacity:${isAbsent ? 0.4 : 1}">
                    <img class="avatar" src="${getAvatar(name)}">
                    <span style="font-weight:600;">${name}</span>
                </div>`;
        }).join('');
    }

    document.getElementById('datePicker').valueAsDate = new Date();
    fetchData();
</script>
</body>
</html>
